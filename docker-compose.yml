services:
  db:
    image: postgres:15
    container_name: springstreet_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: springstreet
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: springstreet_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@springstreet.com
      PGADMIN_DEFAULT_PASSWORD: secret
    ports:
      - "5051:80"
    depends_on:
      - db

volumes:
  pgdata: